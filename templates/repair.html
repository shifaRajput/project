<div class="back-btn-wrapper">
    <a href="/" class="back-btn">
        <i class="fa fa-arrow-left"></i> Back to Home
    </a>
</div>

<div class="main-card">
    <div class="card-header">
        <div class="animation-wrapper">
            <i class="fa-solid fa-wrench tool wrench-anim"></i>
            <i class="fa-solid fa-screwdriver tool screwdriver-anim"></i>
        </div>
        <h1>Book a Repair</h1>
        <p>Professional repair service for mobiles, computers & laptops</p>
    </div>

    <form id="repairForm">
        <h3 class="section-title">Personal Information</h3>
        <div class="form-grid">
            <div class="field full">
                <label>Full Name *</label>
                <input type="text" name="userName" placeholder="Full Name" required>
            </div>
            <div class="field">
                <label>Email *</label>
                <input type="email" name="userEmail" placeholder="abc@gmail.com" required>
            </div>
            <div class="field">
                <label>Phone *</label>
                <input type="tel" name="userPhone" placeholder="Enter 10 digit number" required>
            </div>
        </div>

        <h3 class="section-title">Repair Details</h3>
        <div class="form-grid">
            <div class="field">
                <label>Device Type *</label>
                <select name="deviceType" required>
                    <option value="">Select</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Computer">Computer</option>
                </select>
            </div>
            <div class="field">
                <label>Brand *</label>
                <input type="text" name="brand" placeholder="eg.iphone, Samsung" required>
            </div>
            <div class="field">
                <label>Model *</label>
                <input type="text" name="model" placeholder="eg.iphone 12, Samsung 14" required>
            </div>
            <div class="field">
                <label>Issue *</label>
                <select name="issueDesc" required>
                    <option value="">Select</option>
                    <option value="Screen Damage">Screen Damage</option>
                    <option value="Battery Issue">Battery Issue</option>
                    <option value="Software Problem">Software Problem</option>
                </select>
            </div>
            <div class="field full">
                <label>Describe Issue</label>
                <textarea name="issueDetail"></textarea>
            </div>
            <div class="field">
                <label>Date *</label>
                <input type="date" name="date" required>
            </div>
            <div class="field">
                <label>Slot *</label>
                <select name="slot" required>
                    <option value="">Select</option>
                    <option value="10 AM - 12 PM">10 AM - 12 PM</option>
                    <option value="12 PM - 2 PM">12 PM - 2 PM</option>
                    <option value="2 PM - 4 PM">2 PM - 4 PM</option>
                    <option value="4 PM - 6 PM">4 PM - 6 PM</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn">
            <span class="text">Book Repair Appointment</span>
            <span class="icon">
                <i class="fa-solid fa-paper-plane"></i>
            </span>
        </button>
    </form>
</div> <div class="custom-modal" id="customAlert">
    <div class="custom-modal-content">
        <div class="custom-modal-icon" id="customAlertIcon"></div>
        <h3 id="customAlertTitle">Message</h3>
        <p id="customAlertText">Details go here.</p>
        <button class="custom-modal-btn" id="customAlertBtn" onclick="closeCustomAlert()">OK</button>
    </div>
</div>

<script src="{{ url_for('static', filename='repair.js') }}"></script>
</body>
</html>
