<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<link rel="stylesheet" href="{{ url_for('static', filename='cart.css') }}">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>

<!--nav bar-->
  <!-- Desktop Navbar -->
<nav class="navbar desktop-navbar">
  <div class="navbar-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>

  <ul class="navbar-center">
    <li class="active"><a href="{{ url_for('home') }}"><i class="fa-solid fa-house"></i> Home</a></li>
    <li><a href="{{ url_for('sell_bp.sell_page') }}"><i class="fa-solid fa-tag"></i> Sell</a></li>
    <li><a href="{{ url_for('repair_bp.repair_page') }}"><i class="fa-solid fa-screwdriver-wrench"></i> Repair</a></li>
    <li><a href="{{ url_for('myorders.order_page') }}"><i class="fa-solid fa-box"></i> My Order</a></li>
    <li><a href="{{ url_for('profile') }}"><i class="fa-solid fa-user"></i> Me</a></li>
  </ul>

  <div class="navbar-right">
    <a href="{{ url_for('cart') }}"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="{{ url_for('wishlist') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>
<!-- Mobile Top Bar -->
<nav class="mobile-topbar">
  <div class="mobile-left">
    <div class="logo-circle">2MB</div>
    <span class="brand-name">Computer</span>
  </div>

  <div class="mobile-right">
    <a href="{{ url_for('cart') }}"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="{{ url_for('wishlist') }}"><i class="fa-regular fa-heart"></i></a>
  </div>
</nav>

<nav class="mobile-bottom-nav">
  <a href="{{ url_for('home') }}" class="nav-item active">
    <i class="fa-solid fa-house"></i>
    <span>Home</span>
  </a>
  <a href="{{ url_for('sell_bp.sell_page') }}" class="nav-item">
    <i class="fa-solid fa-tag"></i>
    <span>Sell</span>
  </a>
  <a href="{{ url_for('repair_bp.repair_page') }}" class="nav-item">
    <i class="fa-solid fa-screwdriver-wrench"></i>
    <span>Repair</span>
  </a>
  <a href="{{ url_for('myorders.order_page') }}" class="nav-item">
    <i class="fa-solid fa-box"></i>
    <span>Orders</span>
  </a>
  <a href="{{ url_for('profile') }}" class="nav-item">
    <i class="fa-solid fa-user"></i>
    <span>Me</span>
  </a>
</nav>

<!-- CART -->

<div class="container">


<h2>Shopping Cart</h2>



<!-- PRODUCT 1 -->

<div class="cart-item">

<div class="left">

<img src="dell-2.jpg">

<div>

<h3>Dell</h3>

<p class="price">59999</p>

<div class="qty">

<button class="minus">-</button>

<span>1</span>

<button class="plus">+</button>

</div>

</div>

</div>


<div class="right">

<i class="fa fa-heart heart"></i>

<i class="fa fa-trash remove"></i>

</div>

</div>




<!-- PRODUCT 2 -->

<div class="cart-item">

<div class="left">

<img src="lenovo2.jpg">

<div>

<h3>Lenovo</h3>

<p class="price">52999</p>

<div class="qty">

<button class="minus">-</button>

<span>1</span>

<button class="plus">+</button>

</div>

</div>

</div>


<div class="right">

<i class="fa fa-heart heart"></i>

<i class="fa fa-trash remove"></i>

</div>

</div>




<!-- PRODUCT 3 -->

<div class="cart-item">

<div class="left">

<img src="hp2.jpg">

<div>

<h3>HP</h3>

<p class="price">32999</p>

<div class="qty">

<button class="minus">-</button>

<span>1</span>

<button class="plus">+</button>

</div>

</div>

</div>


<div class="right">

<i class="fa fa-heart heart"></i>

<i class="fa fa-trash remove"></i>

</div>

</div>



</div>
<!-- SUMMARY SECTION -->

<div class="summary">

<div class="row">
<span>Subtotal:</span>
<span id="subtotal">0</span>
</div>

<div class="row">
<span>Delivery Charge:</span>
<span id="delivery">100</span>
</div>

<div class="row total">
<span>Grand Total:</span>
<span id="grandtotal">₹0</span>
</div>

<button id="paymentBtn" class="checkout-btn">
Proceed to Payment
</button>

</div>


<script src="{{ url_for('static', filename='cart.js') }}"></script>


</body>
</html>
